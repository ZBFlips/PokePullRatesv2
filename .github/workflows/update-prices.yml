name: Update Prices
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          pip install playwright
          playwright install chromium
      - name: Run Scraper
        run: python scraper/update_prices.py
      - name: Deploy
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add prices.json
          git commit -m "Automated price update [skip ci]" || echo "No changes"
          git push
