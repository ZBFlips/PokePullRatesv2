name: Weekly Price Update

on:
  # Run every Sunday at 00:00 UTC
  schedule:
    - cron: "0 0 * * 0"

  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write   # needed to commit prices.json back to the repo

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python (no extra packages needed — uses stdlib only)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Run the scraper from the repo root so prices.json lands in root
      - name: Run price scraper
        run: python scraper/update_prices.py

      # 4. Check if prices.json actually changed
      - name: Check for changes
        id: changes
        run: |
          git diff --quiet prices.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      # 5. Commit and push only if prices changed
      - name: Commit updated prices
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git commit -m "chore: auto-update card prices [$(date -u '+%Y-%m-%d')]"
          git push

      # 6. Log if nothing changed (prices were already current)
      - name: No changes detected
        if: steps.changes.outputs.changed == 'false'
        run: echo "prices.json is already up to date — no commit needed."
